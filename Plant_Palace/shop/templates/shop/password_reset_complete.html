{% extends 'shop/base.html' %}
{% block title %}Password Reset — Plant Palace{% endblock %}
{% block content %}
<div class="container py-5 text-center">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="checkout-card">
        <div style="font-size:4rem;">✅</div>
        <h4 class="fw-bold mt-3">Password Reset Complete</h4>
        <p class="text-muted">Your password has been set successfully. You can now log in.</p>
        <button class="btn btn-success rounded-pill px-4" data-bs-toggle="modal" data-bs-target="#loginModal">
          <i class="bi bi-box-arrow-in-right me-2"></i>Login Now
        </button>
      </div>
    </div>
  </div>
</div>
{% endblock %}
