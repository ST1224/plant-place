{% extends 'shop/base.html' %}
{% block title %}Set New Password — Plant Palace{% endblock %}
{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="checkout-card">
        <h4 class="fw-bold mb-4 text-center"><i class="bi bi-key text-success me-2"></i>Set New Password</h4>
        <form method="post">
          {% csrf_token %}
          {{ form.as_p }}
          <button type="submit" class="btn btn-success w-100 py-2 fw-semibold mt-2">
            <i class="bi bi-check me-2"></i>Set Password
          </button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
