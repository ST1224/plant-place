{% extends 'shop/base.html' %}
{% block title %}Reset Password — Plant Palace{% endblock %}
{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="checkout-card text-center">
        <i class="bi bi-lock-fill text-success fs-1 mb-3"></i>
        <h4 class="fw-bold mb-2">Reset Password</h4>
        <p class="text-muted mb-4">Enter your email and we'll send you a reset link.</p>
        <form method="post">
          {% csrf_token %}
          <div class="mb-3 text-start">
            <label class="form-label">Email Address</label>
            <input type="email" class="form-control" name="email" required placeholder="your@email.com" />
          </div>
          <button type="submit" class="btn btn-success w-100 py-2 fw-semibold">
            <i class="bi bi-send me-2"></i>Send Reset Link
          </button>
        </form>
        <hr />
        <p class="small text-muted mb-0">
          Remembered it? <a href="#" class="text-success" data-bs-toggle="modal" data-bs-target="#loginModal">Login</a>
        </p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
